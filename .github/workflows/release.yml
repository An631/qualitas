name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ─── Step 1: Version PR or publish root package ──────────────────────────
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Configure npm
        run: |
          npm config set provenance true
          npm config set access public

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Run changesets
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          version: bash scripts/version.sh
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Step 2: Build native binaries (only after root was published) ──────
  build-native:
    name: Build napi ${{ matrix.settings.name }}
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64-gnu
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64-gnu
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - name: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin
          - name: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin
          - name: win32-x64-msvc
            host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.name }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.settings.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --omit=optional

      - name: Build native addon
        run: npm run build -- --target ${{ matrix.settings.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.name }}
          path: '*.node'
          if-no-files-found: error

  # ─── Step 3: Build standalone CLI binaries ───────────────────────────────
  build-cli:
    name: Build CLI ${{ matrix.settings.name }}
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: qualitas
            archive: qualitas-linux-x64.tar.gz
          - name: linux-arm64
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: qualitas
            archive: qualitas-linux-arm64.tar.gz
            cross: true
          - name: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin
            binary: qualitas
            archive: qualitas-darwin-x64.tar.gz
          - name: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin
            binary: qualitas
            archive: qualitas-darwin-arm64.tar.gz
          - name: win32-x64
            host: windows-latest
            target: x86_64-pc-windows-msvc
            binary: qualitas.exe
            archive: qualitas-win32-x64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.settings.name }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.settings.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI binary
        run: cargo build --release -p qualitas-cli --target ${{ matrix.settings.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.settings.target }}/release
          tar czf ../../../${{ matrix.settings.archive }} ${{ matrix.settings.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.settings.target }}/release/${{ matrix.settings.binary }}" -DestinationPath "${{ matrix.settings.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.settings.name }}
          path: ${{ matrix.settings.archive }}
          if-no-files-found: error

  # ─── Step 4: Publish platform packages + GitHub Release ──────────────────
  publish-platform:
    name: Publish platform packages & GitHub Release
    needs: [changesets, build-native, build-cli]
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Configure npm
        run: |
          npm config set provenance true
          npm config set access public

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move bindings to platform packages
        run: |
          for dir in artifacts/bindings-*; do
            name=$(basename "$dir" | sed 's/bindings-//')
            mkdir -p "npm/$name"
            cp "$dir"/*.node "npm/$name/"
            echo "Moved napi binary to npm/$name/:"
            ls -la "npm/$name/"*.node
          done

      - name: Move CLI binaries to platform packages
        run: |
          declare -A CLI_MAP
          CLI_MAP[cli-linux-x64]="linux-x64-gnu"
          CLI_MAP[cli-linux-arm64]="linux-arm64-gnu"
          CLI_MAP[cli-darwin-x64]="darwin-x64"
          CLI_MAP[cli-darwin-arm64]="darwin-arm64"
          CLI_MAP[cli-win32-x64]="win32-x64-msvc"

          for artifact_dir in artifacts/cli-*; do
            name=$(basename "$artifact_dir")
            target_dir="npm/${CLI_MAP[$name]}"

            if [ -z "${CLI_MAP[$name]}" ]; then
              echo "WARNING: Unknown CLI artifact: $name"
              continue
            fi

            archive=$(ls "$artifact_dir"/qualitas-*.tar.gz "$artifact_dir"/qualitas-*.zip 2>/dev/null | head -1)
            if [[ "$archive" == *.tar.gz ]]; then
              tar xzf "$archive" -C "$target_dir"
            elif [[ "$archive" == *.zip ]]; then
              unzip -o "$archive" -d "$target_dir"
            fi

            echo "Moved CLI binary to $target_dir/:"
            ls -la "$target_dir"/qualitas*
          done

      - name: Publish platform packages
        run: |
          FAILED=0
          for pkg_dir in npm/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              echo "Publishing $pkg_dir..."
              if ! npm publish "./$pkg_dir" --provenance --access public 2>&1 | tee /tmp/npm-out.log; then
                if grep -q "EPUBLISHCONFLICT\|You cannot publish over" /tmp/npm-out.log; then
                  echo "Skipping $pkg_dir (already published)"
                else
                  echo "ERROR: Failed to publish $pkg_dir"
                  FAILED=1
                fi
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more platform packages failed to publish"
            exit 1
          fi

      - name: Get version
        id: version
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            artifacts/**/*.node
            artifacts/cli-*/*
          generate_release_notes: true
