name: Build Binaries & Publish Platform Packages

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build napi native bindings per platform ─────────────────────────────
  build-native:
    name: Build napi ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64-gnu
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: linux-arm64-gnu
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true

          - name: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin

          - name: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin

          - name: win32-x64-msvc
            host: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.name }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.settings.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --omit=optional

      - name: Build native addon
        run: npm run build -- --target ${{ matrix.settings.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.name }}
          path: '*.node'
          if-no-files-found: error

  # ─── Build standalone Rust CLI binary per platform ───────────────────────
  build-cli:
    name: Build CLI ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: qualitas
            archive: qualitas-linux-x64.tar.gz

          - name: linux-arm64
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: qualitas
            archive: qualitas-linux-arm64.tar.gz
            cross: true

          - name: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin
            binary: qualitas
            archive: qualitas-darwin-x64.tar.gz

          - name: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin
            binary: qualitas
            archive: qualitas-darwin-arm64.tar.gz

          - name: win32-x64
            host: windows-latest
            target: x86_64-pc-windows-msvc
            binary: qualitas.exe
            archive: qualitas-win32-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.settings.name }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.settings.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI binary
        run: cargo build --release -p qualitas-cli --target ${{ matrix.settings.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.settings.target }}/release
          tar czf ../../../${{ matrix.settings.archive }} ${{ matrix.settings.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.settings.target }}/release/${{ matrix.settings.binary }}" -DestinationPath "${{ matrix.settings.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.settings.name }}
          path: ${{ matrix.settings.archive }}
          if-no-files-found: error

  # ─── Test napi bindings on each platform ─────────────────────────────────
  test-native:
    name: Test ${{ matrix.os }}
    needs: build-native
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: bindings-linux-x64-gnu
          - os: macos-latest
            artifact: bindings-darwin-arm64
          - os: windows-latest
            artifact: bindings-win32-x64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --omit=optional

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .

      - name: Compile TypeScript
        run: npm run build:ts

      - name: Run JS tests
        run: npm run test:ts

  # ─── Publish platform packages to npm ────────────────────────────────────
  publish-platform:
    name: Publish platform packages
    needs: test-native
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Configure npm for provenance
        run: |
          npm config set provenance true
          npm config set access public

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move bindings to platform packages
        run: |
          for dir in artifacts/bindings-*; do
            name=$(basename "$dir" | sed 's/bindings-//')
            echo "Moving $dir/*.node to npm/$name/"
            mkdir -p "npm/$name"
            cp "$dir"/*.node "npm/$name/"
            ls -la "npm/$name/"
          done

      - name: Publish platform packages
        run: |
          for pkg_dir in npm/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              echo "Publishing $pkg_dir..."
              npm publish "$pkg_dir" --provenance --access public || echo "Warning: failed to publish $pkg_dir (may already exist)"
            fi
          done

  # ─── Create GitHub Release with all binaries ─────────────────────────────
  github-release:
    name: GitHub Release
    needs: [test-native, build-cli, publish-platform]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.node
            artifacts/cli-*/*
          generate_release_notes: true
