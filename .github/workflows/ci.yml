name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Rust: lint + unit tests ──────────────────────────────────────────────
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Run Rust unit tests
        run: cargo test --workspace

      - name: Build standalone CLI
        run: cargo build -p qualitas-cli

      - name: CLI smoke test
        run: ./target/debug/qualitas --help

      - name: Self-analysis quality gate
        run: ./target/debug/qualitas crates/ --threshold 60

  # ─── JS: build native + integration tests ────────────────────────────────
  js:
    name: JS integration tests (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check "js/**/*.ts" "tests/**/*.ts"

      - name: ESLint
        run: npx eslint js/ tests/

      - name: Build native addon (release)
        run: npm run build

      - name: Compile TypeScript
        run: npm run build:ts

      - name: Run JS integration tests
        run: npm test

  # ─── Confirm both jobs pass ───────────────────────────────────────────────
  all-pass:
    name: All checks passed
    needs: [rust, js]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.rust.result }}" != "success" || "${{ needs.js.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed"
